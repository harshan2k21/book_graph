<!DOCTYPE html>

<html class="light" lang="en"><head>

<title>BookGraph V2 - Add Book Modal</title>

<style>
        .glass-overlay {
            backdrop-filter: blur(12px);
            background-color: rgba(252, 249, 244, 0.7); /* surface color with opacity */
        }
        .modal-shadow {
            box-shadow: 0px 8px 32px rgba(217, 119, 6, 0.08), 0px 4px 12px rgba(0, 0, 0, 0.04);
        }
        .input-glow:focus {
            border-color: #3525cd; /* primary */
            box-shadow: 0 1px 0 0 #3525cd;
            outline: none;
        }
        .progress-bar {
            transition: width 2s ease-in-out;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        .animate-pulse-glow {
            animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .shimmer-border {
            position: relative;
        }
        .shimmer-border::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent, rgba(254, 147, 44, 0.3), transparent);
            z-index: -1;
            border-radius: inherit;
            animation: shimmer 3s infinite linear;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen relative overflow-hidden flex items-center justify-center">
<!-- Background context (pretending we are over the app) -->
<div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(circle at 20% 30%, #e2dfff 0%, transparent 40%), radial-gradient(circle at 80% 70%, #ffdcc3 0%, transparent 40%);"></div>
<!-- The Overlay & Modal -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-md sm:p-gutter glass-overlay">
<!-- Modal Card -->
<div aria-labelledby="modal-title" aria-modal="true" class="bg-surface-container-lowest modal-shadow rounded-2xl w-full max-w-lg overflow-hidden flex flex-col relative" role="dialog">
<!-- Header -->
<div class="px-gutter py-lg border-b border-outline-variant/30 flex items-start gap-md">
<div class="w-10 h-10 rounded-full bg-primary-container/10 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div>
<h2 class="font-headline-md text-headline-md text-on-surface" id="modal-title">Add to Library</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">AI will analyze and connect this book to your graph.</p>
</div>
<button aria-label="Close modal" class="ml-auto text-outline hover:text-on-surface transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Content Area (Forms) -->
<div class="p-gutter flex flex-col gap-lg">
<!-- Inputs -->
<div class="flex flex-col gap-md">
<!-- Title Input -->
<div>
<label class="sr-only" for="book-title">Book Title</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-sm font-headline-md text-headline-md text-on-surface placeholder:text-outline-variant input-glow" id="book-title" placeholder="Book Title" type="text" value="The Dispossessed"/>
</div>
<!-- Author Input -->
<div>
<label class="sr-only" for="book-author">Author</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-sm font-body-lg text-body-lg text-on-surface-variant placeholder:text-outline-variant input-glow italic" id="book-author" placeholder="Author" type="text" value="Ursula K. Le Guin"/>
</div>
</div>
<!-- Status Selector -->
<div>
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-sm uppercase tracking-widest">Reading Status</label>
<div class="flex flex-wrap gap-sm">
<button class="flex items-center gap-xs px-md py-xs rounded-full border border-outline-variant bg-surface hover:bg-surface-container-low transition-colors font-label-md text-label-md text-on-surface">
<span class="w-2 h-2 rounded-full bg-outline"></span>
                            Want to Read
                        </button>
<button class="flex items-center gap-xs px-md py-xs rounded-full border-2 border-primary bg-primary/5 transition-colors font-label-md text-label-md text-primary font-bold">
<span class="w-2 h-2 rounded-full bg-primary"></span>
                            Reading
                        </button>
<button class="flex items-center gap-xs px-md py-xs rounded-full border border-outline-variant bg-surface hover:bg-surface-container-low transition-colors font-label-md text-label-md text-on-surface">
<span class="w-2 h-2 rounded-full bg-secondary"></span>
                            Finished
                        </button>
</div>
</div>
<!-- AI Processing State (Mocked active for demo) -->
<div class="mt-md bg-surface-container-low rounded-lg p-md border border-outline-variant/30 shimmer-border">
<div class="flex flex-col gap-md">
<!-- Step 1 -->
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-secondary animate-pulse-glow">psychology</span>
<div class="flex-1">
<div class="flex justify-between items-end mb-xs">
<span class="font-label-sm text-label-sm text-on-surface">Llama3 parsing metadata...</span>
</div>
<div class="h-1 w-full bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-secondary progress-bar w-full"></div>
</div>
</div>
<span class="material-symbols-outlined text-secondary text-sm">check_circle</span>
</div>
<!-- Step 2 -->
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-primary animate-pulse-glow">account_tree</span>
<div class="flex-1">
<div class="flex justify-between items-end mb-xs">
<span class="font-label-sm text-label-sm text-on-surface">Mapping themes &amp; concepts...</span>
<span class="font-label-sm text-label-sm text-primary">68%</span>
</div>
<div class="h-1 w-full bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-primary progress-bar w-2/3"></div>
</div>
</div>
<span class="material-symbols-outlined text-outline text-sm animate-pulse">more_horiz</span>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="px-gutter py-md border-t border-outline-variant/30 bg-surface flex justify-end gap-md">
<button class="px-lg py-sm rounded-lg font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low transition-colors">
                    Cancel
                </button>
<button class="px-lg py-sm rounded-lg bg-primary text-on-primary font-label-md text-label-md hover:bg-primary-container hover:text-on-primary-container transition-colors shadow-sm flex items-center gap-xs opacity-80 cursor-not-allowed">
<span class="material-symbols-outlined text-sm animate-spin">sync</span>
                    Analyzing...
                </button>
</div>
</div>
</div>
<script>
        // Simple script to simulate progress bar loading for visual effect
        document.addEventListener('DOMContentLoaded', () => {
            const step2Bar = document.querySelector('.w-2\\/3');
            setTimeout(() => {
                if(step2Bar) {
                    step2Bar.classList.remove('w-2/3');
                    step2Bar.style.width = '85%';
                    step2Bar.previousElementSibling.textContent = '85%';
                }
            }, 1000);
        });
    </script>
</body></html>
